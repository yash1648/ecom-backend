spring:

  mongodb:
      host: localhost
      port: 27017
      database: notification
      username: root
      password: password
      authentication-database: admin

  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

        spring.json.type.mapping:
          orderConfirmation:com.grim.order.kafka.order.OrderConfirmation,
          paymentConfirmation:com.grim.notification.kafka.payment.PaymentConfirmation
      group-id: paymentGroup,orderGroup
      auto-offset-reset: earliest
  mail:
    host: localhost
    port: 1025
    username: grim
    password: grim
    properties:
      mail:
        smtp:
          trust: "*"
        auth: true
        starttls:
          enabled: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000
server:
  port: 8086